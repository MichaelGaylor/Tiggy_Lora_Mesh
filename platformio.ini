; ═══════════════════════════════════════════════════════════════
; LoRa Mesh Communicator v3.1
; ═══════════════════════════════════════════════════════════════
; Build targets:
;   pio run -e tdeck-plus    (main communicator)
;   pio run -e lora32        (cheap repeater/relay node)
;   pio run -e heltec-v3     (repeater with SX1262)
;   pio run -e heltec-v4     (repeater with SX1262 + 28dBm PA)
;   pio run -e xiao-s3       (ultra-cheap £10 repeater, XIAO + Wio-SX1262)
; ═══════════════════════════════════════════════════════════════

; ─── Shared settings ─────────────────────────────────────────
; Pin platform version to ensure local PIO and CI produce identical builds.
; v6.6.0 = Arduino-ESP32 v2.0.14 (stable, well-tested BLE stack).
; Without this pin, PIO may resolve to pioarduino v54.x (Arduino v3.x)
; which has a different bootloader and BLE stack that causes boot crashes.
[common]
platform = espressif32@6.6.0
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps =
    jgromes/RadioLib@^7.0.0

; ─── T-Deck Plus (main communicator) ─────────────────────────
; ESP32-S3 + SX1262 + GPS + Keyboard + 2.8" TFT
; Full UI, messaging, tracking, mesh map
[env:tdeck-plus]
platform = ${common.platform}
board = esp32-s3-devkitc-1
framework = ${common.framework}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi

build_src_filter = +<*> -<repeater.cpp> -<gateway_wifi.cpp> -<io_expansion.cpp>

build_flags =
    -DBOARD_TDECK_PLUS
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDEBUG=1
    -DCORE_DEBUG_LEVEL=1

; ─── LoRa32 T3 V1.6.1 (repeater / relay node) ──────────────
; ESP32 + SX1276 + 0.96" OLED
; Headless mesh repeater + relay/sensor control
; ~£15 per unit - deploy as many as needed
[env:lora32]
platform = ${common.platform}
board = ttgo-lora32-v1
framework = ${common.framework}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306@^2.5.7

build_src_filter = +<repeater.cpp>
board_build.partitions = min_spiffs.csv

build_flags =
    -DBOARD_LORA32
    -DDEBUG=1
    -DCORE_DEBUG_LEVEL=0

; ─── Heltec WiFi LoRa 32 V3 (repeater / relay node) ──────────
; ESP32-S3 + SX1262 + 0.96" OLED
; ~£20 - mid-range repeater with better radio
[env:heltec-v3]
platform = ${common.platform}
board = heltec_wifi_lora_32_V3
framework = ${common.framework}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306@^2.5.7

build_src_filter = +<repeater.cpp>

build_flags =
    -DBOARD_HELTEC_V3
    -DDEBUG=1
    -DCORE_DEBUG_LEVEL=1

; ─── Heltec WiFi LoRa 32 V4 (repeater / relay node) ──────────
; ESP32-S3 + SX1262 + GC1109 PA (28dBm!) + 0.96" OLED
; 16MB flash, native USB-C, solar input, GNSS connector
; ~£25 - highest TX power repeater option
[env:heltec-v4]
platform = ${common.platform}
board = heltec_wifi_lora_32_V3
framework = ${common.framework}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306@^2.5.7

board_build.flash_size = 16MB

build_src_filter = +<repeater.cpp>

; V4 has NO CP2102 — must use HWCDC for serial.
; USB_MODE=1 (board default) + CDC_ON_BOOT=1 makes Serial = HWCDC Serial
; (framework HWCDC.cpp line 395: #if ARDUINO_USB_MODE / #if ARDUINO_USB_CDC_ON_BOOT / HWCDC Serial;)
build_flags =
    -DBOARD_HELTEC_V4
    -DRADIOLIB_GODMODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DNATIVE_USB_ONLY=1
    -DDEBUG=1
    -DCORE_DEBUG_LEVEL=1

; ─── Seeed XIAO ESP32S3 + Wio-SX1262 (ultra-cheap repeater) ──
; ESP32-S3 + SX1262 — tiny 10x21mm board, no screen
; £10.20 from The Pi Hut — cheapest SX1262 mesh node possible
[env:xiao-s3]
platform = ${common.platform}
board = seeed_xiao_esp32s3
framework = ${common.framework}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306@^2.5.7

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi

build_src_filter = +<repeater.cpp>

build_flags =
    -DBOARD_XIAO_S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDEBUG=1
    -DCORE_DEBUG_LEVEL=1

; ═══════════════════════════════════════════════════════════════
; WiFi Gateway targets — bridge LoRa mesh to cloud hub via WiFi
; Compiles gateway_wifi.cpp instead of repeater/main
; Configure via BLE: WIFI,ssid,pass / HUBURL,ws://... / SAVE
; ═══════════════════════════════════════════════════════════════

; ─── WiFi Gateway — Heltec V2 (ESP32 + SX1276) ──────────────
; Classic ESP32 board, SX1276 radio, OLED status display
; Note: tight on flash — CORE_DEBUG_LEVEL=0 to fit in 1.9MB partition
[env:gateway-heltec-v2]
platform = ${common.platform}
board = heltec_wifi_lora_32_V2
framework = ${common.framework}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306@^2.5.7
    links2004/WebSockets@^2.4.0

board_build.partitions = min_spiffs.csv

build_src_filter = +<gateway_wifi.cpp>

build_flags =
    -DBOARD_HELTEC_V2
    -DGATEWAY_MODE
    ; No VERIFY_TLS_CERT — V2 has only 80KB free heap, not enough for cert verification
    -DDEBUG=1
    -DCORE_DEBUG_LEVEL=0

; ─── WiFi Gateway — Heltec V3 (ESP32-S3 + SX1262) ───────────
; Mid-range gateway with better SX1262 radio
[env:gateway-heltec-v3]
platform = ${common.platform}
board = heltec_wifi_lora_32_V3
framework = ${common.framework}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306@^2.5.7
    links2004/WebSockets@^2.4.0

build_src_filter = +<gateway_wifi.cpp>

build_flags =
    -DBOARD_HELTEC_V3
    -DGATEWAY_MODE
    -DVERIFY_TLS_CERT
    -DDEBUG=1
    -DCORE_DEBUG_LEVEL=1

; ─── WiFi Gateway — Heltec V4 (ESP32-S3 + SX1262, 16MB) ─────
; Best gateway option: 28dBm PA, solar input, 16MB flash
[env:gateway-heltec-v4]
platform = ${common.platform}
board = heltec_wifi_lora_32_V3
framework = ${common.framework}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306@^2.5.7
    links2004/WebSockets@^2.4.0

board_build.flash_size = 16MB

build_src_filter = +<gateway_wifi.cpp>

; V4 native USB — CDC_ON_BOOT=1 + USB_MODE=1 (default) = Serial via HWCDC
build_flags =
    -DBOARD_HELTEC_V4
    -DRADIOLIB_GODMODE=1
    -DGATEWAY_MODE
    -DVERIFY_TLS_CERT
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DNATIVE_USB_ONLY=1
    -DDEBUG=1
    -DCORE_DEBUG_LEVEL=1

; ─── WiFi Gateway — XIAO ESP32S3 + Wio-SX1262 ───────────────
; Ultra-compact £10 gateway — plug-together, no soldering
[env:gateway-xiao-s3]
platform = ${common.platform}
board = seeed_xiao_esp32s3
framework = ${common.framework}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306@^2.5.7
    links2004/WebSockets@^2.4.0

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi

build_src_filter = +<gateway_wifi.cpp>

build_flags =
    -DBOARD_XIAO_S3
    -DGATEWAY_MODE
    -DVERIFY_TLS_CERT
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDEBUG=1
    -DCORE_DEBUG_LEVEL=1

; ─── IO Expansion Board ───────────────────────────────────────
; Cheap ESP32 as serial I/O slave — connects to a mesh node via UART.
; No LoRa, no mesh, no BLE — just reads sensors and sets relays.
; Flash to any ESP32 devkit board.
; ─── IO Expansion Board ───────────────────────────────────────
[env:io-expansion]
platform = ${common.platform}
board = esp32dev
framework = ${common.framework}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}

build_src_filter = +<io_expansion.cpp>

build_flags =
    -DCORE_DEBUG_LEVEL=0
