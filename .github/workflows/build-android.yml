name: Build Android App

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android-app/gradlew

      - name: Build debug APK
        run: |
          cd android-app
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoRa-Mesh-Android-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Rename APK for release
        if: github.event_name == 'release'
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk android-app/app/build/outputs/apk/debug/LoRa-Mesh.apk

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/app/build/outputs/apk/debug/LoRa-Mesh.apk
