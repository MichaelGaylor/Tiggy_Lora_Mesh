<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiggyOpenMesh - Gateway Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0e14; color: #c5cdd9; }
  #map { width: 100vw; height: calc(100vh - 140px); }
  .header-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(10, 14, 20, 0.9); backdrop-filter: blur(10px);
    padding: 8px 16px; display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid #1a2030;
  }
  .header-bar h1 { font-size: 14px; color: #00d4ff; font-weight: 600; }
  .header-bar .stat { font-size: 12px; color: #8899aa; }
  .header-bar .stat b { color: #00d4ff; }
  .legend {
    position: fixed; bottom: 160px; left: 20px; z-index: 1000;
    background: rgba(10, 14, 20, 0.9); backdrop-filter: blur(10px);
    border: 1px solid #1a2030; border-radius: 8px; padding: 12px;
    font-size: 11px;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .popup-content { font-family: 'Segoe UI', sans-serif; font-size: 13px; }
  .popup-content .name { font-weight: 600; font-size: 14px; color: #333; }
  .popup-content .detail { color: #666; margin: 2px 0; }
  .popup-content .online { color: #00b300; font-weight: 600; }
  .popup-content .offline { color: #cc0000; font-weight: 600; }

  /* Sensor dashboard bar */
  .sensor-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(10, 14, 20, 0.95); backdrop-filter: blur(10px);
    border-top: 1px solid #1a2030;
    padding: 8px 16px; height: 140px;
    display: flex; flex-direction: column;
  }
  .sensor-bar h2 { font-size: 12px; color: #00d4ff; margin-bottom: 6px; font-weight: 600; }
  .sensor-grid {
    display: flex; gap: 12px; overflow-x: auto; flex: 1;
  }
  .sensor-card {
    background: #141a22; border: 1px solid #1a2030; border-radius: 6px;
    padding: 8px 12px; min-width: 140px; flex-shrink: 0;
  }
  .sensor-card .label { font-size: 10px; color: #8899aa; }
  .sensor-card .value { font-size: 18px; font-weight: 700; color: #00E5FF; }
  .sensor-card .range { font-size: 9px; color: #556; }
  .sensor-card canvas { display: block; margin-top: 4px; }
  .no-sensors { color: #556; font-size: 11px; padding: 20px; text-align: center; }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
  }
  .marker-online { animation: pulse 2s infinite; }
</style>
</head>
<body>

<div class="header-bar">
  <h1>TiggyOpenMesh Gateway Map</h1>
  <span class="stat">Gateways: <b id="gw-total">0</b></span>
  <span class="stat">Online: <b id="gw-online" style="color:#00cc00">0</b></span>
  <span class="stat">Offline: <b id="gw-offline" style="color:#cc4444">0</b></span>
  <span class="stat">Packets: <b id="pkt-total" style="color:#00d4ff">0</b></span>
  <span class="stat" style="margin-left:auto">Auto-refresh 10s</span>
</div>

<div id="map"></div>

<div class="sensor-bar">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
    <h2 style="margin:0">Sensor Monitor</h2>
    <input id="aes-key" type="password" placeholder="AES key (16 chars)" maxlength="16"
      style="background:#141a22;border:1px solid #1a2030;border-radius:4px;padding:4px 8px;color:#c5cdd9;font-size:11px;width:160px;font-family:monospace">
    <span id="decrypt-status" style="font-size:10px;color:#556"></span>
  </div>
  <div class="sensor-grid" id="sensor-grid">
    <div class="no-sensors" id="no-sensors">Enter AES key to decrypt sensor data from mesh nodes</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#00cc00;box-shadow:0 0 6px #00cc00"></div> Online Gateway</div>
  <div class="legend-item"><div class="legend-dot" style="background:#cc4444"></div> Offline Gateway</div>
  <div class="legend-item"><div class="legend-dot" style="background:rgba(0,180,255,0.15);border:1px solid rgba(0,180,255,0.4)"></div> Coverage Ring</div>
  <div class="legend-item"><div style="width:20px;height:2px;background:#00cc00;opacity:0.5"></div> Gateway Link</div>
</div>

<script>
const map = L.map('map', { zoomControl: true }).setView([51.5, -3.0], 8);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 19,
  subdomains: 'abcd'
}).addTo(map);

const ANTENNA_TYPES = ['Indoor', 'External', 'Rooftop'];
const BASE_RADIUS = [800, 2000, 4000];

function coverageRadius(antennaType, height) {
  const base = BASE_RADIUS[antennaType] || 800;
  return base * Math.sqrt(Math.max(height, 1));
}

function createIcon(online) {
  const color = online ? '#00cc00' : '#cc4444';
  const glow = online ? 'drop-shadow(0 0 6px #00cc00)' : '';
  const cls = online ? 'marker-online' : '';
  return L.divIcon({
    className: '',
    html: `<div class="${cls}" style="
      width: 20px; height: 20px; border-radius: 50%;
      background: ${color}; border: 2px solid #fff;
      filter: ${glow};
    "></div>`,
    iconSize: [20, 20],
    iconAnchor: [10, 10],
    popupAnchor: [0, -14],
  });
}

let markers = {};
let circles = {};
let linkLines = [];
let totalPackets = 0;

function formatUptime(seconds) {
  if (seconds < 60) return seconds + 's';
  if (seconds < 3600) return Math.floor(seconds / 60) + 'm';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return h + 'h ' + m + 'm';
}

function updateMap(gateways) {
  const seen = new Set();
  let total = 0, online = 0, offline = 0;
  const onlineGateways = [];

  // Remove old link lines
  linkLines.forEach(l => map.removeLayer(l));
  linkLines = [];

  gateways.forEach(gw => {
    const id = gw.id;
    seen.add(id);
    total++;
    if (gw.online) { online++; onlineGateways.push(gw); } else offline++;
    totalPackets += gw.packets || 0;

    const antName = ANTENNA_TYPES[gw.antenna_type] || 'Unknown';
    const radius = coverageRadius(gw.antenna_type, gw.antenna_height);

    const popupHtml = `
      <div class="popup-content">
        <div class="name">${gw.name}</div>
        <div class="detail ${gw.online ? 'online' : 'offline'}">${gw.online ? 'ONLINE' : 'OFFLINE'}</div>
        <div class="detail">Antenna: ${antName} (${gw.antenna_height}m)</div>
        <div class="detail">Coverage: ~${(radius/1000).toFixed(1)}km</div>
        ${gw.online ? `<div class="detail">Uptime: ${formatUptime(gw.uptime)}</div>` : ''}
        ${gw.online ? `<div class="detail">Packets: ${gw.packets}</div>` : ''}
        <div class="detail" style="font-size:11px;color:#999">ID: ${gw.id}</div>
      </div>
    `;

    if (markers[id]) {
      markers[id].setLatLng([gw.lat, gw.lon]);
      markers[id].setIcon(createIcon(gw.online));
      markers[id].setPopupContent(popupHtml);
      circles[id].setLatLng([gw.lat, gw.lon]);
      circles[id].setRadius(radius);
      circles[id].setStyle({
        color: gw.online ? 'rgba(0,180,255,0.5)' : 'rgba(200,100,100,0.3)',
        fillColor: gw.online ? 'rgba(0,180,255,0.08)' : 'rgba(200,100,100,0.05)',
      });
    } else {
      circles[id] = L.circle([gw.lat, gw.lon], {
        radius: radius,
        color: gw.online ? 'rgba(0,180,255,0.5)' : 'rgba(200,100,100,0.3)',
        fillColor: gw.online ? 'rgba(0,180,255,0.08)' : 'rgba(200,100,100,0.05)',
        fillOpacity: 1,
        weight: 1,
      }).addTo(map);

      markers[id] = L.marker([gw.lat, gw.lon], { icon: createIcon(gw.online) })
        .bindPopup(popupHtml)
        .addTo(map);
    }
  });

  // Draw connection lines between online gateways
  for (let i = 0; i < onlineGateways.length; i++) {
    for (let j = i + 1; j < onlineGateways.length; j++) {
      const a = onlineGateways[i], b = onlineGateways[j];
      const line = L.polyline(
        [[a.lat, a.lon], [b.lat, b.lon]],
        { color: '#00cc00', weight: 1.5, opacity: 0.3, dashArray: '8,6' }
      ).addTo(map);
      linkLines.push(line);
    }
  }

  // Remove stale markers
  Object.keys(markers).forEach(id => {
    if (!seen.has(id)) {
      map.removeLayer(markers[id]);
      map.removeLayer(circles[id]);
      delete markers[id];
      delete circles[id];
    }
  });

  document.getElementById('gw-total').textContent = total;
  document.getElementById('gw-online').textContent = online;
  document.getElementById('gw-offline').textContent = offline;
}

// Sensor dashboard
function drawSparkline(canvas, values, color) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  if (values.length < 2) return;

  const max = Math.max(...values), min = Math.min(...values);
  const range = Math.max(max - min, 1);
  const step = w / (values.length - 1);

  // Fill
  ctx.beginPath();
  values.forEach((v, i) => {
    const x = i * step;
    const y = h - ((v - min) / range * h * 0.85 + h * 0.05);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = color + '15';
  ctx.fill();

  // Line
  ctx.beginPath();
  values.forEach((v, i) => {
    const x = i * step;
    const y = h - ((v - min) / range * h * 0.85 + h * 0.05);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

const SENSOR_COLORS = ['#00E5FF', '#00E676', '#FF9100', '#448AFF', '#FF5252', '#FFE000'];

function updateSensors(data) {
  const grid = document.getElementById('sensor-grid');
  const noSensors = document.getElementById('no-sensors');
  const keys = Object.keys(data);

  if (keys.length === 0) {
    noSensors.style.display = 'block';
    return;
  }
  noSensors.style.display = 'none';

  // Build/update cards
  keys.sort().forEach((key, idx) => {
    const info = data[key];
    const color = SENSOR_COLORS[idx % SENSOR_COLORS.length];
    let card = document.getElementById('sc-' + key);

    if (!card) {
      card = document.createElement('div');
      card.className = 'sensor-card';
      card.id = 'sc-' + key;
      card.innerHTML = `
        <div class="label">${key}</div>
        <div class="value" id="sv-${key}">--</div>
        <div class="range" id="sr-${key}"></div>
        <canvas id="sg-${key}" width="120" height="30"></canvas>
      `;
      grid.appendChild(card);
    }

    document.getElementById('sv-' + key).textContent = info.current;
    document.getElementById('sv-' + key).style.color = color;
    document.getElementById('sr-' + key).textContent = `${info.min} — ${info.max}  (${info.count} readings)`;

    const canvas = document.getElementById('sg-' + key);
    const values = info.history.map(h => h.v);
    drawSparkline(canvas, values, color);
  });
}

let firstLoad = true;

async function fetchGateways() {
  try {
    const resp = await fetch('/api/gateways');
    const data = await resp.json();
    updateMap(data);

    // Sum packets for header
    const pkts = data.reduce((s, g) => s + (g.packets || 0), 0);
    document.getElementById('pkt-total').textContent = pkts;

    if (firstLoad && data.length > 0) {
      firstLoad = false;
      const bounds = L.latLngBounds(data.map(g => [g.lat, g.lon]));
      map.fitBounds(bounds, { padding: [60, 60], maxZoom: 13 });
    }
  } catch (e) {
    console.warn('Failed to fetch gateways:', e);
  }
}

// ── AES-128-GCM client-side decryption (Web Crypto API) ──
// The hub stores raw encrypted hex blobs. We decrypt in-browser
// so sensor data stays end-to-end encrypted — hub never sees plaintext.

const GCM_NONCE_LEN = 12;
const GCM_TAG_LEN = 16;
let lastSensorTs = 0;
const sensorState = {};  // key -> {current, min, max, count, history[]}
const MAX_HISTORY = 60;

function hexToBytes(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2)
    bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
  return bytes;
}

async function importAesKey(keyStr) {
  const enc = new TextEncoder();
  return crypto.subtle.importKey('raw', enc.encode(keyStr), { name: 'AES-GCM' }, false, ['decrypt']);
}

async function decryptGcm(hexBlob, cryptoKey) {
  const raw = hexToBytes(hexBlob);
  if (raw.length < GCM_NONCE_LEN + GCM_TAG_LEN + 1) return null;
  const nonce = raw.slice(0, GCM_NONCE_LEN);
  const ciphertextAndTag = raw.slice(GCM_NONCE_LEN);
  try {
    const plainBuf = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: nonce, tagLength: GCM_TAG_LEN * 8 },
      cryptoKey,
      ciphertextAndTag
    );
    return new TextDecoder().decode(plainBuf);
  } catch (e) {
    return null;  // wrong key or tampered
  }
}

function processSensorText(nodeId, text) {
  // text format: SDATA,<nodeId>,<pin>:<val>,... or just the raw message
  const sdataPrefix = 'SDATA,';
  if (!text.startsWith(sdataPrefix)) return;
  const parts = text.split(',');
  if (parts.length < 3) return;
  const srcNode = parts[1];
  for (let i = 2; i < parts.length; i++) {
    const pv = parts[i].split(':');
    if (pv.length !== 2) continue;
    const pin = parseInt(pv[0]), val = parseInt(pv[1]);
    if (isNaN(pin) || isNaN(val)) continue;
    const key = srcNode + ':' + pin;
    if (!sensorState[key]) {
      sensorState[key] = { current: val, min: val, max: val, count: 0, history: [] };
    }
    const s = sensorState[key];
    s.current = val;
    s.min = Math.min(s.min, val);
    s.max = Math.max(s.max, val);
    s.count++;
    s.history.push({ v: val, t: Date.now() });
    if (s.history.length > MAX_HISTORY) s.history.shift();
  }
}

async function fetchSensors() {
  const keyInput = document.getElementById('aes-key');
  const status = document.getElementById('decrypt-status');
  const keyStr = keyInput.value;
  if (keyStr.length !== 16) {
    if (keyStr.length > 0) status.textContent = 'Key must be 16 chars';
    return;
  }

  try {
    const cryptoKey = await importAesKey(keyStr);
    const resp = await fetch('/api/sensors?since=' + lastSensorTs);
    const data = await resp.json();
    const packets = data.packets || [];
    let decrypted = 0, failed = 0;

    for (const pkt of packets) {
      if (pkt.ts > lastSensorTs) lastSensorTs = pkt.ts;
      const plain = await decryptGcm(pkt.encrypted, cryptoKey);
      if (plain) {
        processSensorText(pkt.from, plain);
        decrypted++;
      } else {
        failed++;
      }
    }

    if (packets.length > 0) {
      status.textContent = `${decrypted} decrypted` + (failed ? `, ${failed} failed` : '');
      status.style.color = failed ? '#FF9100' : '#00E676';
    }

    updateSensors(sensorState);
  } catch (e) {
    status.textContent = 'Decrypt error';
    status.style.color = '#FF5252';
  }
}

fetchGateways();
fetchSensors();
setInterval(fetchGateways, 10000);
setInterval(fetchSensors, 5000);
</script>
</body>
</html>
